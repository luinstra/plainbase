name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ---- The release floor: universal JAR build + JVM test suite + spike ----
  # A native-image regression must NEVER fail this job (§6 Phase 0, task 5).
  build-test:
    name: Build + test (JVM, universal JAR floor)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - name: Build (backend + embedded frontend) and run tests
        run: ./gradlew build --console=plain

      - name: Run full-stack dependency spike on the JVM
        run: ./gradlew :server:run --args="spike" --console=plain

      - name: Upload distribution
        uses: actions/upload-artifact@v4
        with:
          name: plainbase-jvm-dist
          path: server/build/distributions/

  # ---- Docker image (compose tier) ----
  docker-image:
    name: Docker image build
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: plainbase:ci
          load: true

      - name: Smoke test image (health endpoint + SPA shell)
        run: |
          # The image binds DEFAULT_HOST=127.0.0.1 (secure-by-default, ADR-0008), which a published
          # port can't reach — so run the container as the local DEV tier: bind 0.0.0.0 with the
          # explicit PLAINBASE_INSECURE_HTTP override that clears the fail-closed bind guard. This is an
          # ephemeral localhost-only CI container; a real deployment is fronted by a TLS reverse proxy.
          docker run -d --name plainbase-smoke -p 8080:8080 \
            -e PLAINBASE_HOST=0.0.0.0 -e PLAINBASE_INSECURE_HTTP=true \
            -v "$PWD/fixtures/demo-docs:/content" plainbase:ci
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8080/healthz; then ok=1; break; fi
            sleep 2
          done
          test "$ok" = "1"
          curl -fsS http://localhost:8080/ | grep -q '<div id="root">'
          docker rm -f plainbase-smoke

  # ---- Native gate (Phase 0, non-negotiable): build the native binary, run the
  # test suite AND the spike against it. Covers linux-x64; the platform matrix
  # grows by Phase 6. Failure here blocks the native ARTIFACT, never the JAR job.
  native-gate:
    name: Native gate (linux-x64)
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4

      # GraalVM from the current line (25): native-image buildtools 1.x and its
      # reachability-metadata repository require it. Kotlin bytecode still
      # targets 21 via the Gradle toolchain — the native binary is built FROM
      # 21-targeted class files BY the GraalVM 25 compiler.
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: "25"
          distribution: graalvm-community
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: gradle/actions/setup-gradle@v4

      - name: Build native binary
        run: ./gradlew :server:nativeCompile --console=plain

      - name: Run test suite as native image
        run: ./gradlew :server:nativeTest --console=plain

      - name: Run full-stack dependency spike against the native binary
        run: ./server/build/native/nativeCompile/plainbase spike

      - name: Smoke test — native binary serves health endpoint with no JRE
        run: |
          CONTENT_DIR=fixtures/demo-docs DATA_DIR=/tmp/pb-data \
            ./server/build/native/nativeCompile/plainbase serve &
          SERVER_PID=$!
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8080/healthz; then ok=1; break; fi
            sleep 1
          done
          test "$ok" = "1"
          curl -fsS http://localhost:8080/ | grep -q '<div id="root">'
          kill $SERVER_PID

      - name: Upload native binary
        uses: actions/upload-artifact@v4
        with:
          name: plainbase-linux-x64
          path: server/build/native/nativeCompile/plainbase
